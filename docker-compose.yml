version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: skillswap-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-skillswap}
    volumes:
      - mongo_data:/data/db
    networks:
      - skillswap

  backend:
    image: ghcr.io/purushotham-reddy-n/skillswap-backend:latest
    container_name: skillswap-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: ${PORT:-5001}
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB:-skillswap}
      JWT_SECRET: ${JWT_SECRET:-temp_secret_for_ci}

      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@skillswap.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      ADMIN_PIC_URL: ${ADMIN_PIC_URL:-}

      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      PUBLIC_SERVER_URL: ${PUBLIC_SERVER_URL:-http://localhost:5001}
    ports:
      - "${BACKEND_BIND_ADDRESS:-0.0.0.0}:${PORT:-5001}:5001"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - skillswap

  client:
    image: ghcr.io/purushotham-reddy-n/skillswap-client:latest
    container_name: skillswap-client
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5001}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5001}
      VITE_UPLOADS_URL: ${VITE_UPLOADS_URL:-http://localhost:5001}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - skillswap

volumes:
  mongo_data:

networks:
  skillswap:
    driver: bridge