services:
  mongo:
    image: mongo:7
    container_name: skillswap-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: skillswap-backend
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - path: ./backend/.env.example
        required: true
      - path: ./backend/.env
        required: false
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    command: npm start

  client:
    build:
      context: ./client
    container_name: skillswap-client
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - path: ./client/.env.example
        required: true
      - path: ./client/.env
        required: false
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  mongo_data:
